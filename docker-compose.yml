services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-api.txt
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: sh /app/backend/start-api.sh
    volumes:
      - ./backend:/app/backend
      - whisper_models:/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-api.txt
    restart: always
    command: sh /app/backend/start-scheduler.sh
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - whisper_models:/models

  backend-tests:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-test.txt
    env_file:
      - .env
    command: sh /app/backend/start-test.sh
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini:ro

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt

volumes:
  postgres_data:
  whisper_models:
