services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-api.txt
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: sh /app/start-api.sh
    volumes:
      - whisper_models:/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-api.txt
    restart: always
    command: sh /app/start-scheduler.sh
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - whisper_models:/models
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY}
    restart: always
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r)=>{if(!r.ok) process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

  backend-tests:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-test.txt
    env_file:
      - .env
    command: sh /app/start-test.sh
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/tests:/app/tests
      - ./backend/pytest.ini:/app/pytest.ini:ro

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deployment/certbot/www:/var/www/certbot
      - ./deployment/certbot/conf:/etc/letsencrypt

volumes:
  postgres_data:
  whisper_models:
